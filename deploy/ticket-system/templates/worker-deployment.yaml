apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-worker
  template:
    metadata:
      labels:
        app: demo-worker
    spec:
      containers:
        - name: demo-worker
          image: "{{ .Values.image.dockerhubUser }}/demo-worker:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ConnectionStrings__Redis
              value: "redis-service:6379"
          # 健康檢查設定
          livenessProbe: # 檢查 Pod 是否還活著，失敗會重啟 Pod
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe: # 檢查 Pod 是否準備好，失敗會暫時從 Service 剔除
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
