apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
spec:
  ingressClassName: "nginx"
  rules:
    - host: allen.demoapi.com
      http:
        paths:
          - pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 8080
            path: /
