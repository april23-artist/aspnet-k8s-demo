apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-api
  namespace: "{{ .Values.namespace }}"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-api
  template:
    metadata:
      labels:
        app: demo-api
    spec:
      containers:
        - name: demo-api
          image: "{{ .Values.image.dockerhub-user }}/demo-api:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: Redis__ConnectionString
              value: "redis-service:6379"
            - name: ASPNETCORE_ENVIRONMENT
              value: "{{ .Values.environment }}"
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
  selector:
    app: demo-api
