name: Build and Push Image

on:
  push:
    branches: [ "main", "dev" ] # 監控這兩個分支

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api.Dockerfile
          push: true
          # 使用 Commit ID 作為唯一標籤，避免使用 latest 導致更新不明確
          tags: ${{ secrets.DOCKER_USERNAME }}/demo-api:${{ github.sha }}

      - name: Build and Push Worker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/worker.Dockerfile
          push: true
          # 使用 Commit ID 作為唯一標籤，避免使用 latest 導致更新不明確
          tags: ${{ secrets.DOCKER_USERNAME }}/demo-worker:${{ github.sha }}

      # 【關鍵步驟】更新 Helm 的 values.yaml 裡的 Tag
      - name: Update Image Tag in Helm Chart
        run: |
          sed -i "s/tag: .*/tag: ${{ github.sha }}/g" deploy/ticket-system/values.yaml
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add deploy/ticket-system/values.yaml
          git commit -m "chore: update image tag to ${{ github.sha }}"
          git push